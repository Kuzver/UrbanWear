{% extends 'base.html' %}
{% block content %}
<h2>Оставить отзыв на товар "{{ product.name }}"</h2>
<form method="post">
    {% csrf_token %}
    {% for field in form %}
        <div class="field-wrapper">
            {{ field.errors }}
            {{ field.label_tag }}
            {{ field }}
            {% if field.help_texts %}
                <p class="help">{{ field.help_texts }}</p>
            {% endif %}
        </div>
    {% endfor %}
    <button type="submit">Отправить</button>
</form>
{% endblock %}
