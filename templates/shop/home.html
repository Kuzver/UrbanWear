{% extends 'base.html' %}
{% block title %}UrbanWear{% endblock %}

{% block content %}
<section class="home-page">
    <div class="container">
        <section class="hero-banner">
            <div class="hero-overlay">
                <div class="hero-text">
                    <h1>СТИЛЬ<br><span>НА КАЖДЫЙ ДЕНЬ</span></h1>
                    <p>Актуальная одежда и аксессуары для вашего идеального образа</p>
                    <a href="{% url 'product_list' %}" class="hero-btn">СМОТРЕТЬ КОЛЛЕКЦИЮ</a>
                </div>
                <div class="hero-image-wrap">
                    <img src="/media/demo/hero-cap.jpg" alt="hero">
                </div>
            </div>
        </section>

        <section class="section-block">
            <h2 class="section-title green-title">ПОПУЛЯРНЫЕ КАТЕГОРИИ</h2>
            <div class="category-grid-four">
                <div class="category-card lime-card"><img src="/media/demo/summer.jpg" alt="summer"><span>ЛЕТО</span></div>
                <div class="category-card lime-card"><img src="/media/demo/winter.jpg" alt="winter"><span>ЗИМУ</span></div>
                <div class="category-card lime-card"><img src="/media/demo/shoes.jpg" alt="shoes"><span>ОБУВЬ</span></div>
                <div class="category-card lime-card"><img src="/media/demo/hats.jpg" alt="hats"><span>ГОЛОВНЫЕ УБОРЫ</span></div>
            </div>
        </section>

        <section class="section-block">
            <h2 class="section-title orange-title">ТРЕНДЫ ЭТОГО СЕЗОНА</h2>
            <div class="trend-grid-two">
                <div class="trend-card coral-card">
                    <img src="/media/demo/top.jpg" alt="top">
                    <span>ВЕРХ</span>
                </div>
{% endblock %}
