{% extends 'base.html' %}

{% block title %}Главная | UrbanWear{% endblock %}

{% block content %}
<section class="home-section">

            </div>
            <div class="promo-card promo-card-green">

                <div class="style-item">

                <div class="style-item">

                <div class="style-item">
