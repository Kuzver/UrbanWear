{% extends 'base.html' %}
{% block content %}
<h2>Удаление товара "{{ product.name }}"</h2>
<p>Вы уверены, что хотите удалить этот товар?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Да, удалить</button>
    <a href="{{ product.get_absolute_url }}">Отмена</a>
</form>
{% endblock %}
